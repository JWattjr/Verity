[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
via_ir = true
optimizer = true
optimizer_runs = 200
allow_paths = ["../node_modules"]

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
    "@pythnetwork/pyth-sdk-solidity/=../node_modules/@pythnetwork/pyth-sdk-solidity/",
]
